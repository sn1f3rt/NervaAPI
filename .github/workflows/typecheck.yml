name: ci/gh-actions/typecheck

on:
    push:
        paths-ignore:
            - "README.md"
    pull_request:
        paths-ignore:
            - "README.md"
    workflow_dispatch:

jobs:
    typecheck:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
            -   name: Install uv
                uses: astral-sh/setup-uv@v7
                with:
                    version: "0.9.28"
                    enable-cache: true
            -   name: Set up Python
                uses: actions/setup-python@v6
                with:
                    python-version-file: ".python-version"
            -   name: Install dependencies
                run: uv sync --all-extras
            -   name: Type check
                run: uv run mypy src/backend
