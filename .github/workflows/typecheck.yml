name: ci/gh-actions/typecheck

on:
    push:
        paths-ignore:
            - "README.md"
    pull_request:
        paths-ignore:
            - "README.md"
    workflow_dispatch:

jobs:
    typecheck:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
            -   name: Install uv
                uses: astral-sh/setup-uv@v7
                with:
                    version: "0.9.28"
                    enable-cache: true
            -   name: Set up Python
                uses: actions/setup-python@v6
                with:
                    python-version-file: ".python-version"
            -   name: Set up Node
                uses: actions/setup-node@v4
                with:
                    node-version: "22"
                    cache: "npm"
            -   name: Install backend dependencies
                run: uv sync --all-extras
            -   name: Install frontend dependencies
                run: npm ci
            -   name: Type check (backend + frontend)
                run: npm run typecheck
