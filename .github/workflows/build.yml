name: ci/gh-actions/build

on:
    push:
        paths-ignore:
            - "README.md"
    pull_request:
        paths-ignore:
            - "README.md"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v5
            -   name: Set up Node
                uses: actions/setup-node@v4
                with:
                    node-version: "22"
                    cache: "npm"
            -   name: Install dependencies
                run: npm ci
            -   name: Build
                run: npm run build
