repos:
    -   repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.14.14
        hooks:
            -   id: ruff-check
                args: [--no-fix]
            -   id: ruff-format
                args: [--check]

    -   repo: local
        hooks:
            -   id: mypy
                name: mypy
                entry: mypy
                language: system
                types: [python]
                args: [src/backend]
                pass_filenames: false
